<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEPARTURES BOARD</title>

<style>
body{
    margin:0;
    background:black;
    color:#ffcc00;
    font-family:Arial;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:40px;
    letter-spacing:5px;
    border-bottom:4px solid #ffcc00;
}

#menu{
    position:relative;
    padding:10px;
    background:#0a0a0a;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

#search{
    padding:10px;
    width:320px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
}

select,button,input{
    padding:10px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
    cursor:pointer;
}

#results{
    position:absolute;
    top:50px;
    left:10px;
    width:320px;
    background:#111;
    border:1px solid #333;
    max-height:300px;
    overflow:auto;
    display:none;
    z-index:1000;
}

.item{
    padding:10px;
    cursor:pointer;
}

.item:hover{
    background:#222;
}

#drop{
    margin:10px;
    padding:15px;
    border:2px dashed #444;
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:24px;
}

th{
    background:#111;
    padding:12px;
    border-bottom:3px solid #ffcc00;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #222;
}

tr:nth-child(even){
    background:#0a0a0a;
}

.on{
    color:#00ff66;
}

.delayed{
    color:#ff4444;
    animation:blink 1s infinite;
}

.early{
    color:#00ccff;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}
</style>
</head>

<body>

<header>DEPARTURES</header>

<div id="menu">

    <input id="search" placeholder="Search station...">

    <select id="lang" onchange="setLang(this.value)">
        <option value="it">Italiano</option>
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="ua">Українська</option>
    </select>

    <select id="voiceSelect"></select>

    <button onclick="toggleFullscreen()">FULLSCREEN</button>

    <!-- GTFS ZIP -->
    <input type="file" id="gtfsZip" accept=".zip">

    <!-- GTFS REALTIME PB -->
    <input type="file" id="gtfsRealtime" accept=".pb,.bin">

    <div id="results"></div>
</div>

<div id="drop">
📦 DROP GTFS ZIP HERE
<br><br>
📡 LOAD GTFS REALTIME .PB FILE
</div>

<table>
<thead>
<tr>
<th>Line</th>
<th>Destination</th>
<th>Departure</th>
<th>Status</th>
</tr>
</thead>

<tbody id="board"></tbody>
</table>

<audio id="gong" src="gong.mp3"></audio>

<script type="module">

import GTFSRealtimeBindings from "https://cdn.jsdelivr.net/npm/gtfs-realtime-bindings@1.1.1/+esm";

let stops=[], stopTimes=[], trips=[], routes=[];

let realtimeTripUpdates={};

let currentStop=null;

let spoken={};
let announced10min={};
let announced5min={};
let announced1min={};
let announcedDelay={};

let language="en";

let voices=[];
let selectedVoice=null;

/* ================= VOICES ================= */

function loadVoices(){

    voices=speechSynthesis.getVoices();

    const voiceSelect=document.getElementById("voiceSelect");

    voiceSelect.innerHTML="";

    voices.forEach((v,i)=>{

        const opt=document.createElement("option");

        opt.value=i;
        opt.textContent=`${v.name} (${v.lang})`;

        voiceSelect.appendChild(opt);

    });

    voiceSelect.onchange=()=>{

        selectedVoice=voices[voiceSelect.value];

        localStorage.setItem("voiceIndex", voiceSelect.value);

    };

    const saved=localStorage.getItem("voiceIndex");

    if(saved && voices[saved]){

        voiceSelect.value=saved;
        selectedVoice=voices[saved];

    }else{

        selectedVoice=voices[0];

    }
}

speechSynthesis.onvoiceschanged=loadVoices;
loadVoices();

/* ================= LANGUAGE ================= */

function setLang(l){
    language=l;
}

/* ================= CSV ================= */

function parseCSV(text){

    const rows=[];
    let cur="", row=[], q=false;

    for(let i=0;i<text.length;i++){

        const c=text[i];

        if(c=='"') q=!q;

        else if(c==',' && !q){

            row.push(cur);
            cur="";

        }

        else if(c=='\n' && !q){

            row.push(cur);
            rows.push(row);

            row=[];
            cur="";
        }

        else cur+=c;
    }

    const headers=rows[0];

    return rows.slice(1).map(r=>{

        const o={};

        headers.forEach((h,i)=>{

            o[h.trim()] = (r[i]||"").trim();

        });

        return o;

    });
}

/* ================= NORMALIZE ================= */

function normalize(t){

    return (t||"")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

/* ================= GTFS ZIP ================= */

gtfsZip.onchange=async e=>{

    const file=e.target.files[0];

    if(!file) return;

    const JSZip=(await import("https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm")).default;

    const zip=await JSZip.loadAsync(await file.arrayBuffer());

    stops=parseCSV(await zip.file("stops.txt").async("string"));
    stopTimes=parseCSV(await zip.file("stop_times.txt").async("string"));
    trips=parseCSV(await zip.file("trips.txt").async("string"));
    routes=parseCSV(await zip.file("routes.txt").async("string"));

    alert("GTFS Loaded!");
};

/* ================= GTFS REALTIME PB ================= */

gtfsRealtime.onchange=async e=>{

    const file=e.target.files[0];

    if(!file) return;

    try{

        const buffer=await file.arrayBuffer();

        const feed=GTFSRealtimeBindings.transit_realtime.FeedMessage.decode(
            new Uint8Array(buffer)
        );

        realtimeTripUpdates={};

        feed.entity.forEach(entity=>{

            if(!entity.tripUpdate) return;

            const trip=entity.tripUpdate.trip;

            const updates=entity.tripUpdate.stopTimeUpdate;

            if(!trip || !updates?.length) return;

            const first=updates[0];

            realtimeTripUpdates[trip.tripId]={
                delay:first.departure?.delay || 0
            };

        });

        alert("GTFS Realtime Loaded!");

        console.log(realtimeTripUpdates);

    }catch(err){

        console.error(err);

        alert("Invalid GTFS-RT .pb file");

    }
};

/* ================= SEARCH ================= */

search.oninput=()=>{

    const q=normalize(search.value);

    results.innerHTML="";

    if(!q){
        results.style.display="none";
        return;
    }

    stops
    .filter(s=>normalize(s.stop_name).includes(q))
    .slice(0,50)
    .forEach(s=>{

        const d=document.createElement("div");

        d.className="item";

        d.textContent=s.stop_name;

        d.onclick=()=>{

            currentStop=s.stop_id;

            search.value=s.stop_name;

            results.style.display="none";

            render();
        };

        results.appendChild(d);

    });

    results.style.display="block";
};

document.addEventListener("click",e=>{

    if(!menu.contains(e.target)){

        results.style.display="none";

    }
});

/* ================= HELPERS ================= */

function getRoute(id){

    const t=trips.find(x=>x.trip_id===id);

    const r=routes.find(x=>x.route_id===t?.route_id);

    return r?.route_short_name || "BUS";
}

function getDest(id){

    const t=trips.find(x=>x.trip_id===id);

    return t?.trip_headsign || "UNKNOWN";
}

function timeToSeconds(t){

    if(!t) return 999999;

    const [h,m,s]=t.split(":").map(Number);

    return h*3600 + m*60 + (s||0);
}

/* ================= STATUS ================= */

function getStatus(diff){

    if(diff > 60) return "ON TIME";

    if(diff <= 60 && diff > 20) return "ARRIVING";

    if(diff <= 20 && diff > 1) return "ARRIVED";

    if(diff <= 1 && diff >= 0) return "DEPARTING";

    if(diff < 0 && diff >= -6) return "DEPARTED";

    return "DEPARTED";
}

function getDelayText(delay){

    if(delay > 60){

        return `DELAYED ${Math.floor(delay/60)} MIN`;

    }

    if(delay < -60){

        return `EARLY ${Math.abs(Math.floor(delay/60))} MIN`;

    }

    return "ON TIME";
}

function getTimeLeft(depTime){

    const now=new Date();

    const nowSec=
        now.getHours()*3600 +
        now.getMinutes()*60 +
        now.getSeconds();

    const depSec=timeToSeconds(depTime);

    let diff=depSec-nowSec;

    if(diff<=0) return "DEPARTED";

    const h=Math.floor(diff/3600);

    diff%=3600;

    const m=Math.floor(diff/60);

    const s=diff%60;

    if(h>0) return `⏱ ${h}h ${m}m`;

    if(m>0) return `⏱ ${m}m ${s}s`;

    return `⏱ ${s}s`;
}

/* ================= ANNOUNCE ================= */

async function announce(line,dest,msg){

    const gong=document.getElementById("gong");

    try{
        await gong.play();
    }catch(e){}

    const u=new SpeechSynthesisUtterance(msg);

    u.lang =
        language==="it"?"it-IT":
        language==="de"?"de-DE":
        language==="ua"?"uk-UA":
        "en-US";

    if(selectedVoice){

        u.voice=selectedVoice;

    }

    u.rate=0.9;

    speechSynthesis.speak(u);
}

/* ================= RENDER ================= */

function render(){

    if(!currentStop) return;

    const now=new Date();

    const nowSec=
        now.getHours()*3600 +
        now.getMinutes()*60 +
        now.getSeconds();

    const board=document.getElementById("board");

    board.innerHTML="";

    let data=stopTimes

    .filter(t=>
        t.stop_id===currentStop &&
        t.departure_time
    )

    .map(t=>{

        const realtime=realtimeTripUpdates[t.trip_id];

        const delay=realtime?.delay || 0;

        return {

            trip_id:t.trip_id,

            time:t.departure_time,

            sec:timeToSeconds(t.departure_time)+delay,

            delay
        };

    })

    .filter(t=>t.sec >= nowSec - 6);

    const map=new Map();

    data.forEach(d=>{

        const line=getRoute(d.trip_id);

        const dest=getDest(d.trip_id);

        const key=line+"|"+dest+"|"+d.time;

        if(!map.has(key)){

            map.set(key,d);

        }
    });

    const clean=[...map.values()]
    .sort((a,b)=>a.sec-b.sec)
    .slice(0,15);

    clean.forEach(d=>{

        const line=getRoute(d.trip_id);

        const dest=getDest(d.trip_id);

        const diff=d.sec-nowSec;

        /* 10 MIN */

        if(diff<=600 && diff>595 && !announced10min[d.trip_id]){

            announced10min[d.trip_id]=true;

            announce(
                line,
                dest,
                `There is Bus ${line} to ${dest} ten minute away.`
            );
        }

        /* 5 MIN */

        if(diff<=300 && diff>295 && !announced5min[d.trip_id]){

            announced5min[d.trip_id]=true;

            announce(
                line,
                dest,
                `There is Bus ${line} to ${dest} five minute away.`
            );
        }

        /* 1 MIN */

        if(diff<=60 && diff>55 && !announced1min[d.trip_id]){

            announced1min[d.trip_id]=true;

            announce(
                line,
                dest,
                `The Bus Number ${line} to ${dest} is arriving please let passengers exit first.`
            );
        }

        /* DELAY ANNOUNCEMENT */

        if(d.delay > 120 && !announcedDelay[d.trip_id]){

            announcedDelay[d.trip_id]=true;

            const mins=Math.floor(d.delay/60);

            announce(
                line,
                dest,
                `Attention please. The Bus ${line} to ${dest} is delayed by ${mins} minutes.`
            );
        }

        const tr=document.createElement("tr");

        let statusClass="on";

        if(d.delay > 60){

            statusClass="delayed";

        }

        if(d.delay < -60){

            statusClass="early";

        }

        tr.innerHTML=`
        <td>${line}</td>

        <td>${dest}</td>

        <td>${getTimeLeft(d.time)}</td>

        <td class="${statusClass}">
            ${getStatus(diff)}
            <br>
            ${getDelayText(d.delay)}
        </td>
        `;

        board.appendChild(tr);

        if(!spoken[line]){

            spoken[line]=true;

            announce(
                line,
                dest,
                `The Bus ${line} to ${dest} Added To The Board.`
            );
        }
    });
}

setInterval(render,1000);

/* ================= FULLSCREEN ================= */

function toggleFullscreen(){

    document.documentElement.requestFullscreen();

}

</script>

</body>
</html>
