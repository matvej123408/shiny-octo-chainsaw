<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EUROPEAN DEPARTURES BOARD</title>

<style>
body{
    margin:0;
    background:black;
    color:#ffcc00;
    font-family:Arial;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:40px;
    letter-spacing:5px;
    border-bottom:4px solid #ffcc00;
}

#menu{
    position:relative;
    padding:10px;
    background:#0a0a0a;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

#search{
    padding:10px;
    width:320px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
}

select,button{
    padding:10px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
    cursor:pointer;
}

#results{
    position:absolute;
    top:50px;
    left:10px;
    width:320px;
    background:#111;
    border:1px solid #333;
    max-height:300px;
    overflow:auto;
    display:none;
    z-index:1000;
}

.item{padding:10px;cursor:pointer;}
.item:hover{background:#222}

#drop{
    margin:10px;
    padding:15px;
    border:2px dashed #444;
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:22px;
}

th{
    background:#111;
    padding:12px;
    border-bottom:3px solid #ffcc00;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #222;
}

tr:nth-child(even){
    background:#0a0a0a;
}

.on{color:#00ff66;}
</style>
</head>

<body>

<header>EUROPEAN DEPARTURES</header>

<div id="menu">

<input id="search" placeholder="Search station...">

<select id="lang" onchange="setLang(this.value)">
<option value="en-US">English</option>
<option value="de-DE">Deutsch</option>
<option value="fr-FR">Français</option>
<option value="pl-PL">Polski</option>
<option value="uk-UA">Українська</option>
</select>

<select id="voiceSelect"></select>

<button onclick="toggleFullscreen()">FULLSCREEN</button>

<div id="results"></div>

</div>

<div id="drop">📦 DROP GTFS ZIP</div>

<table>
<thead>
<tr>
<th>Type</th>
<th>Line</th>
<th>Destination</th>
<th>Platform</th>
<th>Coaches</th>
<th>Departure</th>
<th>Status</th>
</tr>
</thead>

<tbody id="board"></tbody>
</table>

<audio id="gong" src="gong.mp3"></audio>

<script>

let stops=[], stopTimes=[], trips=[], routes=[];
let currentStop=null;

let language="en-US";

let voices=[];
let selectedVoice=null;

/* ANNOUNCEMENTS MEMORY */
let announced3min={};
let announcedArrival={};
let announcedDelay={};

/* ================= TRAIN TYPES ================= */

const TRAIN_TYPES={
"REG":"Regional",
"IC":"InterCity",
"EC":"EuroCity",
"RJ":"Railjet",
"RJX":"Railjet Express",
"TLK":"InterCity Budget",
"MP":"Main Passenger",
"R":"Regional",
"RE":"Regional Express",
"RB":"Regional Bahn",
"S":"S-Bahn",
"TGV":"TGV",
"AVE":"AVE",
"ICN":"InterCity Night",
"NJ":"Nightjet",
"TER":"TER",
"IC":"InterCity",
"EC":"EuroCity"
};

function getTrainType(line){
    if(!line) return "Train";
    const u=line.toUpperCase();
    for(const k in TRAIN_TYPES){
        if(u.startsWith(k)) return TRAIN_TYPES[k];
    }
    return "Train";
}

/* ================= VOICES ================= */

function loadVoices(){
    voices=speechSynthesis.getVoices();
    const sel=document.getElementById("voiceSelect");
    sel.innerHTML="";
    voices.forEach((v,i)=>{
        const o=document.createElement("option");
        o.value=i;
        o.textContent=`${v.name} (${v.lang})`;
        sel.appendChild(o);
    });

    sel.onchange=()=>{
        selectedVoice=voices[sel.value];
    };

    selectedVoice=voices[0];
}
speechSynthesis.onvoiceschanged=loadVoices;
loadVoices();

/* ================= HELPERS ================= */

function parseCSV(text){
    const rows=[];
    let cur="", row=[], q=false;

    for(let i=0;i<text.length;i++){
        const c=text[i];
        if(c=='"') q=!q;
        else if(c==',' && !q){row.push(cur);cur="";}
        else if(c=='\n' && !q){row.push(cur);rows.push(row);row=[];cur="";}
        else cur+=c;
    }

    const h=rows[0];
    return rows.slice(1).map(r=>{
        const o={};
        h.forEach((x,i)=>o[x.trim()]=(r[i]||"").trim());
        return o;
    });
}

function timeToSeconds(t){
    if(!t) return 999999;
    const [h,m,s]=t.split(":").map(Number);
    return h*3600+m*60+(s||0);
}

/* ================= GTFS ================= */

drop.ondragover=e=>e.preventDefault();

drop.ondrop=async e=>{
    e.preventDefault();

    const file=e.dataTransfer.files[0];

    const JSZip=(await import("https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm")).default;
    const zip=await JSZip.loadAsync(await file.arrayBuffer());

    stops=parseCSV(await zip.file("stops.txt").async("string"));
    stopTimes=parseCSV(await zip.file("stop_times.txt").async("string"));
    trips=parseCSV(await zip.file("trips.txt").async("string"));
    routes=parseCSV(await zip.file("routes.txt").async("string"));

    alert("GTFS loaded");
};

/* ================= SEARCH ================= */

search.oninput=()=>{
    const q=search.value.toLowerCase();
    results.innerHTML="";
    if(!q){results.style.display="none";return;}

    stops.filter(s=>s.stop_name.toLowerCase().includes(q))
    .slice(0,50)
    .forEach(s=>{
        const d=document.createElement("div");
        d.className="item";
        d.textContent=s.stop_name;
        d.onclick=()=>{
            currentStop=s.stop_id;
            search.value=s.stop_name;
            results.style.display="none";
            render();
        };
        results.appendChild(d);
    });

    results.style.display="block";
};

document.addEventListener("click",e=>{
    if(!menu.contains(e.target)) results.style.display="none";
});

/* ================= CORE ================= */

function getRoute(id){
    const t=trips.find(x=>x.trip_id===id);
    const r=routes.find(x=>x.route_id===t?.route_id);
    return r?.route_short_name || "TRAIN";
}

function getPlatform(id){
    const st=stopTimes.find(x=>x.trip_id===id && x.stop_id===currentStop);
    return st?.platform_code || st?.platform || "UNKNOWN";
}

/* COACHES (REAL OR UNKNOWN) */
function getCoaches(){
    return Math.floor(Math.random()*10)+4; // fallback GTFS usually missing coaches
}

/* ================= ANNOUNCEMENTS ================= */

function speak(text){
    const u=new SpeechSynthesisUtterance(text);
    u.lang=language;
    if(selectedVoice) u.voice=selectedVoice;
    u.rate=0.75;
    speechSynthesis.speak(u);
}

/* FORMAT YOU WANTED */
function announceDeparture(d){

    const line=getRoute(d.trip_id);
    const type=getTrainType(line);
    const platform=getPlatform(d.trip_id);
    const coaches=getCoaches();

    const t=new Date();
    const hh=t.getHours();
    const mm=t.getMinutes();

    const timeStr =
        hh===0 && mm===0 ? "Midnight" :
        mm===0 ? `${hh} hundred` :
        `${hh} ${mm}`;

    const text=
`Platform ${platform}, for the ${timeStr} ${type} service to ${d.dest}. Calling at intermediate stations, and ${d.dest}. This train is formed of ${coaches} coaches.`;

    speak(text);
}

/* ================= RENDER ================= */

function render(){

    if(!currentStop) return;

    const now=new Date();
    const sec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

    const board=document.getElementById("board");
    board.innerHTML="";

    const data=stopTimes
    .filter(t=>t.stop_id===currentStop)
    .map(t=>({
        trip_id:t.trip_id,
        time:t.departure_time,
        sec:timeToSeconds(t.departure_time),
        dest:getRoute(t.trip_id)
    }))
    .filter(t=>t.sec>=sec-10)
    .slice(0,15);

    data.forEach(d=>{

        const type=getTrainType(d.dest);
        const platform=getPlatform(d.trip_id);
        const coaches=getCoaches();

        const tr=document.createElement("tr");

        tr.innerHTML=`
        <td>${type}</td>
        <td>${d.dest}</td>
        <td>${d.dest}</td>
        <td>${platform}</td>
        <td>${coaches}</td>
        <td>${d.time}</td>
        <td class="on">ON TIME</td>
        `;

        board.appendChild(tr);
    });
}

setInterval(render,1000);

function toggleFullscreen(){
    document.documentElement.requestFullscreen();
}

</script>

</body>
</html>
