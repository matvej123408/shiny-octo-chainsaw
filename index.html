<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEPARTURES BOARD</title>

<style>
body{
    margin:0;
    background:black;
    color:#ffcc00;
    font-family:Arial;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:40px;
    letter-spacing:5px;
    border-bottom:4px solid #ffcc00;
}

#menu{
    position:relative;
    padding:10px;
    background:#0a0a0a;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

#search{
    padding:10px;
    width:320px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
}

select,button{
    padding:10px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
    cursor:pointer;
}

#results{
    position:absolute;
    top:50px;
    left:10px;
    width:320px;
    background:#111;
    border:1px solid #333;
    max-height:300px;
    overflow:auto;
    display:none;
    z-index:1000;
}

.item{
    padding:10px;
    cursor:pointer;
}

.item:hover{
    background:#222;
}

#drop{
    margin:10px;
    padding:15px;
    border:2px dashed #444;
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:24px;
}

th{
    background:#111;
    padding:12px;
    border-bottom:3px solid #ffcc00;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #222;
}

tr:nth-child(even){
    background:#0a0a0a;
}

.on{
    color:#00ff66;
}
</style>
</head>

<body>

<header>DEPARTURES</header>

<div id="menu">

<input id="search" placeholder="Search station...">

<select id="lang" onchange="setLang(this.value)">

<option value="af-ZA">Afrikaans</option>
<option value="sq-AL">Albanian</option>
<option value="ar-SA">Arabic</option>
<option value="hy-AM">Armenian</option>
<option value="az-AZ">Azerbaijani</option>
<option value="eu-ES">Basque</option>
<option value="bn-BD">Bengali</option>
<option value="bg-BG">Bulgarian</option>
<option value="ca-ES">Catalan</option>
<option value="zh-CN">Chinese Simplified</option>
<option value="zh-TW">Chinese Traditional</option>
<option value="hr-HR">Croatian</option>
<option value="cs-CZ">Czech</option>
<option value="da-DK">Danish</option>
<option value="nl-NL">Dutch</option>
<option value="en-US" selected>English</option>
<option value="et-EE">Estonian</option>
<option value="fi-FI">Finnish</option>
<option value="fr-FR">French</option>
<option value="gl-ES">Galician</option>
<option value="ka-GE">Georgian</option>
<option value="de-DE">German</option>
<option value="el-GR">Greek</option>
<option value="he-IL">Hebrew</option>
<option value="hi-IN">Hindi</option>
<option value="hu-HU">Hungarian</option>
<option value="is-IS">Icelandic</option>
<option value="id-ID">Indonesian</option>
<option value="ga-IE">Irish</option>
<option value="it-IT">Italian</option>
<option value="ja-JP">Japanese</option>
<option value="kk-KZ">Kazakh</option>
<option value="ko-KR">Korean</option>
<option value="lv-LV">Latvian</option>
<option value="lt-LT">Lithuanian</option>
<option value="mk-MK">Macedonian</option>
<option value="ms-MY">Malay</option>
<option value="no-NO">Norwegian</option>
<option value="fa-IR">Persian</option>
<option value="pl-PL">Polish</option>
<option value="pt-PT">Portuguese</option>
<option value="ro-RO">Romanian</option>
<option value="ru-RU">Russian</option>
<option value="sr-RS">Serbian</option>
<option value="sk-SK">Slovak</option>
<option value="sl-SI">Slovenian</option>
<option value="es-ES">Spanish</option>
<option value="sw-KE">Swahili</option>
<option value="sv-SE">Swedish</option>
<option value="ta-IN">Tamil</option>
<option value="th-TH">Thai</option>
<option value="tr-TR">Turkish</option>
<option value="uk-UA">Ukrainian</option>
<option value="ur-PK">Urdu</option>
<option value="vi-VN">Vietnamese</option>

</select>

<select id="voiceSelect"></select>

<button onclick="toggleFullscreen()">FULLSCREEN</button>

<div id="results"></div>

</div>

<div id="drop">
📦 DROP GTFS ZIP
</div>

<table>
<thead>
<tr>
<th>Line</th>
<th>Destination</th>
<th>Platform</th>
<th>Departure</th>
<th>Status</th>
</tr>
</thead>

<tbody id="board"></tbody>
</table>

<audio id="gong" src="gong.mp3"></audio>

<script>

let stops=[], stopTimes=[], trips=[], routes=[];

let currentStop=null;

let spoken={};
let announced10min={};
let announced5min={};
let announced1min={};

let language="en-US";

let voices=[];
let selectedVoice=null;

/* ================= LOAD VOICES ================= */

function loadVoices(){

    voices=speechSynthesis.getVoices();

    const voiceSelect=document.getElementById("voiceSelect");

    voiceSelect.innerHTML="";

    voices.forEach((v,i)=>{

        const opt=document.createElement("option");

        opt.value=i;

        opt.textContent=`${v.name} (${v.lang})`;

        voiceSelect.appendChild(opt);

    });

    voiceSelect.onchange=()=>{

        selectedVoice=voices[voiceSelect.value];

        localStorage.setItem(
            "voiceIndex",
            voiceSelect.value
        );
    };

    const saved=localStorage.getItem("voiceIndex");

    if(saved && voices[saved]){

        voiceSelect.value=saved;

        selectedVoice=voices[saved];

    }else{

        selectedVoice=voices[0];

    }
}

speechSynthesis.onvoiceschanged=loadVoices;

loadVoices();

/* ================= LANGUAGE ================= */

function setLang(l){

    language=l;

    localStorage.setItem(
        "boardLanguage",
        l
    );
}

const savedLang=
localStorage.getItem("boardLanguage");

if(savedLang){

    language=savedLang;

    document.getElementById("lang").value=savedLang;
}

/* ================= CSV ================= */

function parseCSV(text){

    const rows=[];

    let cur="", row=[], q=false;

    for(let i=0;i<text.length;i++){

        const c=text[i];

        if(c=='"') q=!q;

        else if(c==',' && !q){

            row.push(cur);

            cur="";
        }

        else if(c=='\n' && !q){

            row.push(cur);

            rows.push(row);

            row=[];

            cur="";
        }

        else cur+=c;
    }

    const headers=rows[0];

    return rows.slice(1).map(r=>{

        const o={};

        headers.forEach((h,i)=>{

            o[h.trim()] =
            (r[i]||"").trim();

        });

        return o;
    });
}

/* ================= NORMALIZE ================= */

function normalize(t){

    return (t||"")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

/* ================= DROP GTFS ================= */

drop.ondragover=e=>e.preventDefault();

drop.ondrop=async e=>{

    e.preventDefault();

    const file=e.dataTransfer.files[0];

    const JSZip=(
        await import(
            "https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm"
        )
    ).default;

    const zip=await JSZip.loadAsync(
        await file.arrayBuffer()
    );

    stops=parseCSV(
        await zip.file("stops.txt").async("string")
    );

    stopTimes=parseCSV(
        await zip.file("stop_times.txt").async("string")
    );

    trips=parseCSV(
        await zip.file("trips.txt").async("string")
    );

    routes=parseCSV(
        await zip.file("routes.txt").async("string")
    );

    alert("GTFS loaded!");
};

/* ================= SEARCH ================= */

search.oninput=()=>{

    const q=normalize(search.value);

    results.innerHTML="";

    if(!q){

        results.style.display="none";

        return;
    }

    stops
    .filter(s=>
        normalize(s.stop_name).includes(q)
    )
    .slice(0,50)
    .forEach(s=>{

        const d=document.createElement("div");

        d.className="item";

        d.textContent=s.stop_name;

        d.onclick=()=>{

            currentStop=s.stop_id;

            search.value=s.stop_name;

            results.style.display="none";

            render();
        };

        results.appendChild(d);
    });

    results.style.display="block";
};

document.addEventListener("click",e=>{

    if(!menu.contains(e.target)){

        results.style.display="none";

    }
});

/* ================= HELPERS ================= */

function getRoute(id){

    const t=trips.find(
        x=>x.trip_id===id
    );

    const r=routes.find(
        x=>x.route_id===t?.route_id
    );

    return r?.route_short_name || "BUS";
}

function getDest(id){

    const t=trips.find(
        x=>x.trip_id===id
    );

    return t?.trip_headsign || "UNKNOWN";
}

/* ================= REAL PLATFORM ================= */

function getPlatform(tripId){

    const st=stopTimes.find(x=>

        x.trip_id===tripId &&
        x.stop_id===currentStop

    );

    if(!st) return "-";

    return (

        st.platform_code ||

        st.track ||

        st.platform ||

        st.bay ||

        st.stop_platform ||

        st.stop_code ||

        "-"

    );
}

function timeToSeconds(t){

    if(!t) return 999999;

    const [h,m,s]=t.split(":").map(Number);

    return h*3600 + m*60 + (s||0);
}

/* ================= ANNOUNCEMENTS ================= */

async function announce(line,dest,msgType){

    const gong=document.getElementById("gong");

    try{
        await gong.play();
    }catch(e){}

    let text="";

    switch(msgType){

        case "added":

            text=`${line} to ${dest} added to the board.`;

        break;

        case "10min":

            text=`${line} to ${dest} arriving in ten minutes.`;

        break;

        case "5min":

            text=`${line} to ${dest} arriving in five minutes.`;

        break;

        case "1min":

            text=`${line} to ${dest} is arriving. Please let passengers exit first.`;

        break;

        default:

            text=msgType;
    }

    const u=new SpeechSynthesisUtterance(text);

    u.lang=language;

    if(selectedVoice){

        u.voice=selectedVoice;
    }

    u.rate=0.9;

    speechSynthesis.speak(u);
}

/* ================= STATUS ================= */

function getStatus(diff){

    if(diff > 60) return "ON TIME";

    if(diff <= 60 && diff > 20) return "ARRIVING";

    if(diff <= 20 && diff > 1) return "ARRIVED";

    if(diff <= 1 && diff >= 0) return "DEPARTING";

    if(diff < 0 && diff >= -6) return "DEPARTED";

    return "DEPARTED";
}

function getTimeLeft(depTime){

    const now=new Date();

    const nowSec=
        now.getHours()*3600 +
        now.getMinutes()*60 +
        now.getSeconds();

    const depSec=timeToSeconds(depTime);

    let diff=depSec-nowSec;

    if(diff<=0) return "DEPARTED";

    const h=Math.floor(diff/3600);

    diff%=3600;

    const m=Math.floor(diff/60);

    const s=diff%60;

    if(h>0) return `⏱ ${h}h ${m}m`;

    if(m>0) return `⏱ ${m}m ${s}s`;

    return `⏱ ${s}s`;
}

/* ================= RENDER ================= */

function render(){

    if(!currentStop) return;

    const now=new Date();

    const nowSec=
        now.getHours()*3600 +
        now.getMinutes()*60 +
        now.getSeconds();

    const board=document.getElementById("board");

    board.innerHTML="";

    let data=stopTimes

    .filter(t=>

        t.stop_id===currentStop &&
        t.departure_time

    )

    .map(t=>({

        trip_id:t.trip_id,

        time:t.departure_time,

        sec:timeToSeconds(t.departure_time)

    }))

    .filter(t=>t.sec >= nowSec - 6);

    const map=new Map();

    data.forEach(d=>{

        const line=getRoute(d.trip_id);

        const dest=getDest(d.trip_id);

        const key=line+"|"+dest+"|"+d.time;

        if(!map.has(key)){

            map.set(key,d);
        }
    });

    const clean=[...map.values()]
    .sort((a,b)=>a.sec-b.sec)
    .slice(0,15);

    clean.forEach(d=>{

        const line=getRoute(d.trip_id);

        const dest=getDest(d.trip_id);

        const platform=getPlatform(d.trip_id);

        const diff=d.sec-nowSec;

        /* 10 MIN */

        if(
            diff<=600 &&
            diff>595 &&
            !announced10min[d.trip_id]
        ){

            announced10min[d.trip_id]=true;

            announce(
                line,
                dest,
                "10min"
            );
        }

        /* 5 MIN */

        if(
            diff<=300 &&
            diff>295 &&
            !announced5min[d.trip_id]
        ){

            announced5min[d.trip_id]=true;

            announce(
                line,
                dest,
                "5min"
            );
        }

        /* 1 MIN */

        if(
            diff<=60 &&
            diff>55 &&
            !announced1min[d.trip_id]
        ){

            announced1min[d.trip_id]=true;

            announce(
                line,
                dest,
                "1min"
            );
        }

        const tr=document.createElement("tr");

        tr.innerHTML=`
        <td>${line}</td>
        <td>${dest}</td>
        <td>${platform}</td>
        <td>${getTimeLeft(d.time)}</td>
        <td class="on">${getStatus(diff)}</td>
        `;

        board.appendChild(tr);

        if(!spoken[line]){

            announce(
                line,
                dest,
                "added"
            );

            spoken[line]=true;
        }
    });
}

setInterval(render,1000);

/* ================= FULLSCREEN ================= */

function toggleFullscreen(){

    document.documentElement.requestFullscreen();
}

</script>

</body>
</html>
