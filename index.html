<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EUROPEAN DEPARTURES SYSTEM</title>

<style>
body{
    margin:0;
    background:black;
    color:#ffcc00;
    font-family:Arial;
}

header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:40px;
    border-bottom:4px solid #ffcc00;
}

#menu{
    display:flex;
    gap:10px;
    padding:10px;
    background:#0a0a0a;
    flex-wrap:wrap;
    align-items:center;
}

#search{
    padding:10px;
    width:320px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
}

select,button{
    padding:10px;
    background:#111;
    color:#ffcc00;
    border:1px solid #333;
    cursor:pointer;
}

#results{
    position:absolute;
    background:#111;
    width:320px;
    max-height:300px;
    overflow:auto;
    display:none;
    border:1px solid #333;
    z-index:999;
}

.item{padding:10px;cursor:pointer;}
.item:hover{background:#222;}

#drop{
    margin:10px;
    padding:15px;
    border:2px dashed #444;
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:20px;
}

th,td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #222;
}

th{
    background:#111;
    border-bottom:3px solid #ffcc00;
}

tr:nth-child(even){background:#0a0a0a;}

.on{color:#00ff66;}
.cancel{color:#ff4444;}
.delay{color:#ff8800;}
</style>
</head>

<body>

<header>EUROPEAN DEPARTURES SYSTEM</header>

<div id="menu">

<input id="search" placeholder="Search station...">

<select id="mode">
<option value="schedule">GTFS SCHEDULE</option>
<option value="realtime">GTFS REALTIME</option>
</select>

<select id="voiceSelect"></select>

<button onclick="toggleFullscreen()">FULLSCREEN</button>

<div id="results"></div>

</div>

<div id="drop">📦 DROP GTFS ZIP</div>

<table>
<thead>
<tr>
<th>Type</th>
<th>Line</th>
<th>Destination</th>
<th>Platform</th>
<th>Coaches</th>
<th>Calling At</th>
<th>Departure</th>
<th>Status</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<audio id="gong"></audio>

<script>

let stops=[], stopTimes=[], trips=[], routes=[];
let currentStop=null;

let voices=[], selectedVoice=null;

/* ================= SEARCH FIX ================= */

search.oninput=()=>{

    const q=search.value.toLowerCase().trim();
    results.innerHTML="";
    if(!q){results.style.display="none";return;}

    const seen=new Set();

    stops
    .filter(s=>s.stop_name.toLowerCase().includes(q))
    .filter(s=>{
        if(seen.has(s.stop_name)) return false;
        seen.add(s.stop_name);
        return true;
    })
    .slice(0,50)
    .forEach(s=>{
        const d=document.createElement("div");
        d.className="item";
        d.textContent=s.stop_name;

        d.onclick=()=>{
            currentStop=s.stop_id;
            search.value=s.stop_name;
            results.style.display="none";
            render();
        };

        results.appendChild(d);
    });

    results.style.display="block";
};

document.addEventListener("click",e=>{
    if(!menu.contains(e.target)) results.style.display="none";
});

/* ================= GTFS LOAD ================= */

drop.ondragover=e=>e.preventDefault();

drop.ondrop=async e=>{
    e.preventDefault();

    const file=e.dataTransfer.files[0];

    const JSZip=(await import("https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm")).default;
    const zip=await JSZip.loadAsync(await file.arrayBuffer());

    stops=parseCSV(await zip.file("stops.txt").async("string"));
    stopTimes=parseCSV(await zip.file("stop_times.txt").async("string"));
    trips=parseCSV(await zip.file("trips.txt").async("string"));
    routes=parseCSV(await zip.file("routes.txt").async("string"));

    alert("GTFS loaded");
};

/* ================= CSV ================= */

function parseCSV(text){
    const rows=[];
    let cur="", row=[], q=false;

    for(let i=0;i<text.length;i++){
        const c=text[i];
        if(c=='"') q=!q;
        else if(c==',' && !q){row.push(cur);cur="";}
        else if(c=='\n' && !q){row.push(cur);rows.push(row);row=[];cur="";}
        else cur+=c;
    }

    const h=rows[0];
    return rows.slice(1).map(r=>{
        const o={};
        h.forEach((x,i)=>o[x]=(r[i]||"").trim());
        return o;
    });
}

/* ================= HELPERS ================= */

function timeToSeconds(t){
    if(!t) return 999999;
    const [h,m,s]=t.split(":").map(Number);
    return h*3600+m*60+(s||0);
}

/* ================= CALLING AT ================= */

function getCallingAt(tripId,stopId){

    const list=stopTimes
    .filter(x=>x.trip_id===tripId)
    .sort((a,b)=>Number(a.stop_sequence)-Number(b.stop_sequence));

    let found=false;
    const out=[];

    for(const s of list){

        if(s.stop_id===stopId){
            found=true;
            continue;
        }

        if(found){
            const st=stops.find(x=>x.stop_id===s.stop_id);
            if(st) out.push(st.stop_name);
        }
    }

    return out.length ? out.join(", ") : "No further stops";
}

/* ================= SPEECH ================= */

function speak(text){
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.75;
    u.lang="en-US";
    if(selectedVoice) u.voice=selectedVoice;
    speechSynthesis.speak(u);
}

/* ================= YOUR ANNOUNCEMENT FORMAT ================= */

function departureAnnouncement(d){

    const platform="UNKNOWN";
    const operator="Rail Service";
    const destination=d.dest || "Unknown";

    const coaches=Math.floor(Math.random()*8)+4;

    const now=new Date();
    const hh=now.getHours();
    const mm=now.getMinutes();

    const time=
        hh===0 && mm===0 ? "Midnight" :
        mm===0 ? `${hh} hundred` :
        `${hh} ${mm}`;

    const callingAt=getCallingAt(d.trip_id,currentStop);

    const text=
`Platform ${platform}, for the ${time} ${operator} service to: ${destination}. Calling at ${callingAt}, and ${destination}. This train is formed of ${coaches} coaches.`;

    speak(text);
}

/* ================= DELAY ================= */

function delayAnnouncement(d,operator,dest,time){

    const text=
`The ${time} ${operator} service to ${dest}, is delayed by approximately ${d.delay} minutes. We are sorry that your journey will take longer than planned.`;

    speak(text);
}

/* ================= CANCEL ================= */

function cancelAnnouncement(d,operator,dest,time){

    const text=
`Your attention please! The ${time} ${operator} service to ${dest}, has been cancelled. This is due to a member of the train crew being unavailable.`;

    speak(text);
}

/* ================= RENDER ================= */

function render(){

    if(!currentStop) return;

    const now=new Date();
    const sec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

    const board=document.getElementById("board");
    board.innerHTML="";

    let data=stopTimes
    .filter(t=>t.stop_id===currentStop)
    .map(t=>({
        trip_id:t.trip_id,
        time:t.departure_time,
        sec:timeToSeconds(t.departure_time),
        dest:"Route"
    }))
    .slice(0,15);

    data.forEach(d=>{

        const tr=document.createElement("tr");

        let status="ON TIME";
        let className="on";

        if(d.delay>0){
            status=`DELAY ${d.delay}`;
            className="delay";
        }

        if(d.cancelled){
            status="CANCELLED";
            className="cancel";
        }

        tr.innerHTML=`
        <td>TRAIN</td>
        <td>${d.dest}</td>
        <td>${d.dest}</td>
        <td>UNKNOWN</td>
        <td>UNKNOWN</td>
        <td>...</td>
        <td>${d.time}</td>
        <td class="${className}">${status}</td>
        `;

        board.appendChild(tr);

        /* 🔊 ONLY FIRST TIME ANNOUNCE */
        if(!d.spoken){
            departureAnnouncement(d);
            d.spoken=true;
        }
    });
}

setInterval(render,1000);

function toggleFullscreen(){
    document.documentElement.requestFullscreen();
}

</script>

</body>
</html>
